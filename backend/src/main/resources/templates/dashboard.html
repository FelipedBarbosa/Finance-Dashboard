<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance Dashboard - Real-Time Prices</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .status {
            display: inline-block;
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            font-size: 0.9em;
        }

        .status.connected {
            background: #4caf50;
        }

        .status.disconnected {
            background: #f44336;
        }

        .prices-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .price-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .price-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.15);
        }

        .symbol {
            font-weight: bold;
            font-size: 1.3em;
            color: #333;
            margin-bottom: 10px;
        }

        .price {
            font-size: 1.8em;
            color: #667eea;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .change {
            padding: 8px 12px;
            border-radius: 6px;
            font-weight: bold;
            display: inline-block;
        }

        .change.positive {
            background: #e8f5e9;
            color: #2e7d32;
        }

        .change.negative {
            background: #ffebee;
            color: #c62828;
        }

        .change.neutral {
            background: #f5f5f5;
            color: #666;
        }

        .timestamp {
            font-size: 0.8em;
            color: #999;
            margin-top: 10px;
        }

        .log {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            max-height: 300px;
            overflow-y: auto;
        }

        .log-entry {
            padding: 8px 0;
            border-bottom: 1px solid #eee;
            font-size: 0.9em;
            color: #666;
            font-family: 'Courier New', monospace;
        }

        .log-entry:last-child {
            border-bottom: none;
        }

        .log-entry.info {
            color: #667eea;
        }

        .log-entry.success {
            color: #4caf50;
        }

        .log-entry.error {
            color: #f44336;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>📊 Finance Dashboard</h1>
            <div class="status disconnected" id="status">Desconectado</div>
        </div>

        <div class="prices-grid" id="pricesGrid"></div>

        <div>
            <h3 style="color: white; margin-bottom: 15px;">📜 Atividade</h3>
            <div class="log" id="log"></div>
        </div>
    </div>

    <script>
        const pricesMap = new Map();
        const maxLogEntries = 50;
        const logEntries = [];

        // Conectar ao WebSocket
        let ws;

        function connect() {
            const wsUrl = `ws://${window.location.host}/ws/prices`;
            ws = new WebSocket(wsUrl);

            ws.onopen = () => {
                updateStatus(true);
                addLog('Conectado ao servidor', 'success');
            };

            ws.onmessage = (event) => {
                const message = JSON.parse(event.data);
                updatePrice(message);
                addLog(`${message.symbol}: $${message.price} (${message.percentageChange.toFixed(2)}%)`, 'info');
            };

            ws.onerror = (error) => {
                addLog('Erro na conexão: ' + error, 'error');
            };

            ws.onclose = () => {
                updateStatus(false);
                addLog('Desconectado do servidor', 'error');
                setTimeout(connect, 3000);
            };
        }

        function updateStatus(connected) {
            const statusEl = document.getElementById('status');
            if (connected) {
                statusEl.textContent = '🟢 Conectado';
                statusEl.className = 'status connected';
            } else {
                statusEl.textContent = '🔴 Desconectado';
                statusEl.className = 'status disconnected';
            }
        }

        function updatePrice(message) {
            pricesMap.set(message.symbol, message);
            renderPrices();
        }

        function renderPrices() {
            const grid = document.getElementById('pricesGrid');
            grid.innerHTML = '';

            pricesMap.forEach((data, symbol) => {
                const changeClass = data.percentageChange > 0 ? 'positive' :
                    data.percentageChange < 0 ? 'negative' : 'neutral';
                const changeSign = data.percentageChange > 0 ? '+' : '';

                const card = document.createElement('div');
                card.className = 'price-card';
                card.innerHTML = `
                    <div class="symbol">${symbol}</div>
                    <div class="price">$${data.price.toFixed(2)}</div>
                    <div class="change ${changeClass}">${changeSign}${data.percentageChange.toFixed(2)}%</div>
                    <div class="timestamp">${new Date(data.timestamp).toLocaleTimeString('pt-BR')}</div>
                `;
                grid.appendChild(card);
            });
        }

        function addLog(message, type = 'info') {
            const timestamp = new Date().toLocaleTimeString('pt-BR');
            logEntries.unshift(`[${timestamp}] ${message}`);

            if (logEntries.length > maxLogEntries) {
                logEntries.pop();
            }

            const log = document.getElementById('log');
            log.innerHTML = logEntries.map((entry, i) =>
                `<div class="log-entry ${type}">${entry}</div>`
            ).join('');
        }

        // Iniciar conexão ao carregar
        connect();
    </script>
</body>
</html>
